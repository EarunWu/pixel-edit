server {
    listen 80;
    listen [::]:80;
    server_name pixeledit.polerain.com;

    include /etc/nginx/cloudflare-allow.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/pixel-edit/current;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pixeledit.polerain.com;

    include /etc/nginx/cloudflare-allow.conf;

    root /var/www/pixel-edit/current;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/pixeledit.polerain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixeledit.polerain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
